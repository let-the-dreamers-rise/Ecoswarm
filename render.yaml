services:
  - type: web
    name: ecoswarm-backend
    runtime: node
    plan: free
    buildCommand: cd backend && npm ci && npm run build
    startCommand: cd backend && npm start
    healthCheckPath: /health
    envVars:
      - key: NODE_ENV
        value: production
      - key: AI_SERVICE_URL
        fromService:
          name: ecoswarm-ai
          type: web
          property: host
      - key: HEDERA_ACCOUNT_ID
        sync: false
      - key: HEDERA_PRIVATE_KEY
        sync: false
      - key: HEDERA_NETWORK
        value: testnet
      - key: HEDERA_TOPIC_ID
        sync: false
      - key: SOLAR_TOKEN_ID
        sync: false
      - key: CLEANUP_TOKEN_ID
        sync: false
      - key: REFORESTATION_TOKEN_ID
        sync: false
      - key: CARBON_CAPTURE_TOKEN_ID
        sync: false
      - key: REGISTRY_BROKER_BASE_URL
        value: https://hol.org/registry/api/v1
      - key: HOL_AGENT_PUBLIC_URL
        fromService:
          name: ecoswarm-backend
          type: web
          property: host

  - type: web
    name: ecoswarm-ai
    runtime: python
    plan: free
    buildCommand: cd ai-service && pip install -r requirements.txt
    startCommand: cd ai-service && uvicorn main:app --host 0.0.0.0 --port $PORT
    healthCheckPath: /health

  - type: web
    name: ecoswarm-frontend
    runtime: static
    plan: free
    buildCommand: cd frontend && npm ci && npm run build
    staticPublishPath: ./frontend/dist
    envVars:
      - key: VITE_API_BASE_URL
        fromService:
          name: ecoswarm-backend
          type: web
          property: host
      - key: VITE_WS_URL
        fromService:
          name: ecoswarm-backend
          type: web
          property: host
    routes:
      - type: rewrite
        source: /*
        destination: /index.html

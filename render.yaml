services:
  - type: web
    name: ecoswarm-backend-dreamersrise
    runtime: node
    plan: free
    rootDir: backend
    buildCommand: npm ci && npm run build
    startCommand: npm start
    healthCheckPath: /health
    envVars:
      - key: NODE_ENV
        value: production
      - key: AI_SERVICE_URL
        fromService:
          name: ecoswarm-ai-dreamersrise
          type: web
          property: hostport
      - key: HEDERA_ACCOUNT_ID
        sync: false
      - key: HEDERA_PRIVATE_KEY
        sync: false
      - key: HEDERA_NETWORK
        value: testnet
      - key: HEDERA_TOPIC_ID
        sync: false
      - key: SOLAR_TOKEN_ID
        sync: false
      - key: CLEANUP_TOKEN_ID
        sync: false
      - key: REFORESTATION_TOKEN_ID
        sync: false
      - key: CARBON_CAPTURE_TOKEN_ID
        sync: false
      - key: IMPACT_CERTIFICATE_TOKEN_ID
        sync: false
      - key: ESCROW_CONTRACT_ID
        sync: false
      - key: BACKEND_STATE_PATH
        value: /tmp/ecoswarm-backend-state.json
      - key: REGISTRY_BROKER_BASE_URL
        value: https://hol.org/registry/api/v1
      - key: REGISTRY_BROKER_API_KEY
        sync: false
      - key: PUBLIC_GITHUB_URL
        value: https://github.com/let-the-dreamers-rise/Ecoswarm

  - type: web
    name: ecoswarm-ai-dreamersrise
    runtime: python
    plan: free
    rootDir: ai-service
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT
    healthCheckPath: /health
    envVars:
      - key: GEMINI_API_KEY
        sync: false
